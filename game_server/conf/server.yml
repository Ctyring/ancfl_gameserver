# 服务器基础配置

# 日志配置
log:
  level: INFO
  path: ./logs/
  name: server
  
# 数据库配置
database:
  host: 127.0.0.1
  port: 3306
  user: root
  password: 123456
  dbname: game_server
  pool_size: 10
  
# Redis配置
redis:
  host: 127.0.0.1
  port: 6379
  password: 
  db: 0
  pool_size: 10

# Zookeeper配置
zookeeper:
  hosts: 127.0.0.1:2181
  timeout: 30000
