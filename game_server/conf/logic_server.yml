# 逻辑服务器配置

# 服务配置
service:
  name: LogicServer
  id: 3
  ip: 0.0.0.0
  port: 8001
  max_connections: 5000
  
# 心跳配置
heartbeat:
  interval: 30
  timeout: 60
  
# 连接其他服务器
connections:
  login_server:
    ip: 127.0.0.1
    port: 8000
  db_server:
    ip: 127.0.0.1
    port: 8300
  center_server:
    ip: 127.0.0.1
    port: 8200
